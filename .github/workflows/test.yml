name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov pyyaml jinja2 pydantic httpx python-dotenv rich

      - name: Verify imports (no real LLM calls)
        env:
          OPENAI_API_KEY: "test-key-for-import-only"
          ANTHROPIC_API_KEY: "test-key-for-import-only"
          GOOGLE_API_KEY: "test-key-for-import-only"
          GROQ_API_KEY: "test-key-for-import-only"
          PERPLEXITY_API_KEY: "test-key-for-import-only"
        run: |
          python -c "from src.clients import load_client, list_clients; print('clients:', list_clients())"
          python -c "from src.providers import PROVIDERS, get_provider; print('providers:', sorted(PROVIDERS.keys()))"
          python -c "from src.parsers import slugify, extract_module_blocks; print('parsers ok')"
          python -c "from src.validators.voice_guard import voice_guard_check; print('voice_guard ok')"
          python -c "from src.validators.quality_gate import QualityGate; print('quality_gate ok')"

      - name: Validate client YAMLs
        run: |
          python -c "
          from src.clients import list_clients, load_client
          ids = list_clients()
          assert 'default' in ids, f'cliente default ausente: {ids}'
          for cid in ids:
              c = load_client(cid)
              assert c.author.name, f'{cid}: author.name vazio'
              assert c.domain.canonical_url, f'{cid}: domain.canonical_url vazio'
              print(f'{cid}: OK ({c.author.name})')
          "

      - name: Run pytest
        run: |
          pytest --tb=short -v
