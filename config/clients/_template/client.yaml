# Template de cliente — copie este diretório para config/clients/<novo>/
# e edite os campos marcados com TODO.
#
# Consulte docs/MULTI-CLIENT.md para o playbook completo de integração.

id: TODO_cliente_id

# Autoria e credencial canônica (aparece no SEO, hero e schema.org)
author:
  name: "TODO Nome Completo do Autor"
  credential: "TODO Credencial curta (ex: 'CEO da Empresa X, ex-Y na Z')"
  title_seo_suffix: "TODO Nome Curto"

# Empresa — aparece como provider em schema.org e no bloco de autoria do curso.
# Se não for uma empresa, preencha com o nome comercial do autor mesmo.
company:
  name: "TODO Empresa"
  description: "TODO Descrição curta (1 a 2 frases) que aparece no bloco do autor do curso."

# Domínio onde os cursos serão publicados
domain:
  canonical_url: "https://TODO.com.br"
  educacao_path: "/cursos"  # ou "/aulas", "/educacao", "/academy" ...

# Caminho relativo (a partir da raiz do repo curso-factory) para a landing
# page deste cliente, quando existir. Deixe vazio se ainda não há landing.
landing_page_dir: "../TODO-landing"
educacao_dir: "../TODO-landing/src/app/cursos"

# Branding visual do hero do curso
branding:
  hero_gradient_from: "#111111"
  hero_gradient_to: "#444444"
  badge_color: "#111111"

# Padrão editorial deste cliente
# Estilos suportados: hsm_hbr_mit_sloan | business | academic | technical
editorial:
  style: "business"
  reference_publications: []
  bloom_min_level: 3
  knowles_min_principles: 4
  words_per_module_min: 2000
  words_per_module_max: 4000

# Voice guard — deixe enabled=false se o cliente ainda não tem naming rígido
voice_guard:
  enabled: true
  min_score: 70

  canonical:
    company: "TODO Empresa"
    founder: "TODO Fundador"
    credential_fragments: []
    domains:
      - "TODO.com.br"

  forbidden:
    titles: []
    company_names: []
    domains: []
    rhetoric_openers: []
    # Anti-disclaimers de modelo de IA — válidos para qualquer cliente
    ai_disclaimers:
      - "Como modelo de IA"
      - "como modelo de linguagem"
      - "como uma IA"
      - "devo ressaltar"
      - "como assistente"

output:
  base_dir: "output"

# ─── Waves 6-10 — features opcionais (default off) ─────────────────────
#
# Descomente e ajuste o que quiser ativar. Tudo é opcional; sem este
# bloco, o cliente funciona como antes da Wave 6.
#
# features:
#   # Wave 6 — Engagement (gamificação + microlearning + SRS)
#   engagement:
#     gamification_enabled: true
#     streak_enabled: true
#     badges_enabled: true
#     leagues_enabled: false
#     srs_enabled: true
#     srs_interval_initial_days: 1
#     quiz_pass_threshold: 0.7
#
#   # Wave 7 — Tutor IA conversacional runtime
#   tutor:
#     enabled: true
#     persona: "curiosa-paciente"      # | "provocativa-direta" | "academica-rigorosa"
#     name: "Caramella"
#     model: "claude-haiku-4-5-20251001"
#     budget_per_user_per_month: 2.00  # USD
#     daily_budget: 10.00              # USD
#
#   # Wave 9 — Certificação verificável
#   certification:
#     enabled: true
#     pass_threshold: 0.7
#     blockchain_opt_in: false
#     linkedin_integration: false
#
#   # Wave 10 — Agent Legibility + comércio agêntico
#   agentic:
#     enabled: true
#     emit_llms_txt: true
#     mcp_server: false                # exige servidor próprio rodando
#     a2a_endpoints: false             # exige integração com pagamento agêntico
#
# Wave 8 — idioma default do cliente. Currículo continua aceitando
# `--language en` por curso individual.
# editorial:
#   language: "pt-br"                  # | "en" | "es"
