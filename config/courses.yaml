  - slug: geo-educacao-financeira-40plus
    nome: "GEO para Educação Financeira 40+: Como Virar a Resposta Confiável da IA"
    nivel: avançado
    modulos: 8
    descricao: >
      GEO = Generative Engine Optimization (visibilidade em mecanismos de IA generativa como ChatGPT, Perplexity, Gemini).
      Este curso ensina educadores financeiros, planners, creators e marcas a construir operação answer-first
      para o público 40+, com conteúdo citável por IA generativa e ativos de confiança.
    tags: [geo, educacao-financeira, ia-generativa, publico-40-plus, answer-first, fininfluencia]
    prerequisitos: [seo-geo]
    duracao_estimada: "~400 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "O Novo Funil da Descoberta Financeira"
        descricao: "Finfluência vs. educação vs. recomendação (ANBIMA/CVM). Como IA generativa muda a descoberta. De SEO para GEO: answer engines como novo ponto de entrada."
      - titulo: "Persona 40+ e Jobs-to-be-Done"
        descricao: "Perfil comportamental do público 40+ online. Jobs: aposentadoria, casa própria, dinheiro do casal, reinvenção, proteção. Linguagem: clareza > hype."
      - titulo: "Reverse Engineering dos Benchmarks"
        descricao: "Análise de Me Poupe!, Nath Finanças, Primo Pobre e Gustavo Cerbasi. Flywheels, modelos de negócio, o que copiar vs. diferenciar para 40+."
      - titulo: "GEO para Finanças"
        descricao: "Clusters de perguntas de alta intenção. Páginas answer-first citáveis por ChatGPT/Perplexity/Gemini. FAQs, glossários, simuladores machine-readable. Schema.org."
      - titulo: "IA Generativa com Governança"
        descricao: "Pesquisa e clusterização com IA. Checagem factual. Privacidade e LGPD. Prompts seguros: o que a IA não deve decidir."
      - titulo: "Ativos que Convertem Confiança"
        descricao: "Calculadoras, diagnósticos, newsletter, WhatsApp, lives, comunidade, mentorias. Sequência de nutrição: da descoberta ao produto pago."
      - titulo: "Oferta e Monetização"
        descricao: "Isca gratuita, curso de entrada, assinatura recorrente, mentoria premium. Precificação por valor. Unit economics de infoproduto financeiro."
      - titulo: "Plano de 90 Dias"
        descricao: "Calendário editorial com 6 pilares. Backlog priorizado por intenção de busca. KPIs: citações por IA, tráfego orgânico, leads, conversão, NPS."

  - slug: geo-educacao-financeira-sub18
    nome: "GEO para Educação Financeira Sub-18: Como Criar Conteúdo que a IA Recomenda para Jovens"
    nivel: intermediário
    descricao: >
      GEO = Generative Engine Optimization (visibilidade em mecanismos de IA generativa como ChatGPT, Perplexity, Gemini).
      Este curso ensina educadores financeiros, escolas, fintechs jovens e creators a construir conteúdo answer-first
      sobre educação financeira para menores de 18 anos — crianças e adolescentes.
      NÃO é um curso de finanças pessoais genérico. É sobre como a vertical de educação financeira infantojuvenil
      pode ser encontrada, entendida e confiada quando pais, professores e os próprios jovens perguntam à IA.
      Contexto: BNCC já inclui educação financeira no currículo escolar, 78% dos adolescentes usam IA no dia a dia,
      mesada digital cresce 40% ao ano (dados Caixa Tem, PicPay, Nubank). Benchmarks: Me Poupe! Kids, Turma da Mônica
      Financeira, Canal do Dudu, Cerbasi para Famílias.
    tags: [geo, educacao-financeira, jovens, sub-18, ia-generativa, answer-first, bncc, mesada-digital]
    prerequisitos: [seo-geo]
    duracao_estimada: "~200 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "O Cenário da Educação Financeira Infantojuvenil no Brasil"
        descricao: "BNCC e educação financeira obrigatória. Dados: mesada digital, fintechs jovens (Caixa Tem, PicPay, Nubank Under 18). Como crianças e adolescentes descobrem conteúdo financeiro via IA."
      - titulo: "Persona por Faixa Etária: 6-10, 11-14 e 15-17"
        descricao: "Diferenças cognitivas e de linguagem por faixa. Jobs-to-be-done de cada grupo: mesada, primeiro celular, compras online, poupança, primeiro emprego. Quem decide: pais, professores ou o próprio jovem."
      - titulo: "Benchmarks de Educação Financeira para Jovens"
        descricao: "Me Poupe! Kids, Turma da Mônica Financeira, Canal do Dudu, Cerbasi Famílias, apps de mesada (Mozper, GoHenry, Greenlight). O que funciona e o que falta no mercado brasileiro."
      - titulo: "GEO para Conteúdo Infantojuvenil"
        descricao: "Perguntas reais de pais e jovens à IA. Páginas answer-first adaptadas por faixa etária. FAQs para pais vs. FAQs para adolescentes. Schema.org EducationalContent. Linguagem segura e acessível."
      - titulo: "IA, Segurança e LGPD para Menores"
        descricao: "LGPD e dados de menores (consentimento parental obrigatório). COPPA como referência. IA responsável: o que jovens podem e não podem fazer com IA financeira. Prompts seguros para contexto educacional."
      - titulo: "Gamificação e Ativos Interativos"
        descricao: "Quizzes, simuladores de mesada, desafios de poupança, badges e rankings. Engajamento por faixa etária. Ferramentas: Kahoot, Quizizz, calculadoras interativas."
      - titulo: "Distribuição e Parcerias com Escolas"
        descricao: "Como chegar em escolas e professores. Material didático alinhado à BNCC. Parcerias com secretarias de educação. Plataformas de distribuição: Google Classroom, Khan Academy, YouTube Edu."
      - titulo: "Plano de Lançamento em 60 Dias"
        descricao: "Calendário editorial para 3 públicos (pais, professores, adolescentes). Backlog priorizado. KPIs: citações por IA, adoção escolar, downloads de materiais, engajamento jovem."

  - slug: seo-geo-revendedoras-joias
    nome: "SEO e GEO para Revendedoras de Joias e Semijoias: Autoridade e Vendas na Era da IA"
    nivel: intermediário
    modulos: 8
    descricao: >
      Curso completo que une SEO clássico e GEO (Generative Engine Optimization)
      para revendedoras de joias e semijoias. Da pesquisa de palavras-chave à citação
      em ChatGPT e Perplexity, passando por E-E-A-T, busca visual, SEO local,
      WhatsApp Business e métricas da era generativa. Mercado brasileiro de USD 15 bi
      com margens de 10-500%. Público-alvo: revendedoras autônomas e pequenas marcas
      que querem dominar tráfego orgânico e generativo na economia da IA.
    tags: [seo, geo, joias, semijoias, revendedoras, ecommerce, whatsapp, eeat, busca-visual, seo-local]
    prerequisitos: []
    duracao_estimada: "~480 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "Fundamentação, Inteligência de Mercado e Psicologia do Consumidor Joalheiro"
        descricao: "Motivadores emocionais de compra em 2025 (autoexpressão, sustentabilidade, conquista). Tendências: minimalismo geométrico, mistura de metais, pedras vibrantes, retorno do ouro amarelo. Economia da revenda: margens 10-30% vs. 100-500% fabricação própria. Vocabulário semântico do setor (banho de ouro 18k, ródio negro, zircônia cravejada, antialérgico). Mapeamento de intenção de busca: termos coloquiais vs. técnicos."
      - titulo: "A Fundação Inabalável do SEO Clássico em E-commerce de Acessórios"
        descricao: "Auditoria técnica on-page: mobile-first, velocidade, cache, lazy loading, HTTPS. Pesquisa de palavras-chave: intenção transacional vs. informacional, SEMrush, Google Keyword Planner, cauda longa. Otimização de conteúdo: descrições únicas (eliminar duplicado do fabricante), heading tags H1-H3, meta descriptions persuasivas. Monitoramento: Google Search Console, erros 404, indexabilidade, sitemaps XML."
      - titulo: "A Nova Fronteira — Dominando GEO e AEO"
        descricao: "Do clique à conversação: ChatGPT, Perplexity, Bing Copilot, Google AI Overviews. Conversão 4,4x a 23x maior no tráfego de IA. RAG (Retrieval-Augmented Generation): como LLMs selecionam fontes. Conteúdo answer-first: FAQs rigorosas, definições diretas, blocos Q&A. Otimização de entidades: de palavras-chave soltas para tópicos interconectados. Linguagem técnica natural para LLMs."
      - titulo: "A Engenharia da Confiança — E-E-A-T para Revendedoras Autônomas"
        descricao: "E-E-A-T no contexto YMYL de joias (fraude de materiais, valores altos). Experiência: vídeos não editados, tutoriais de composição, fotos autorais. Especialização: guias de cuidados, artigos sobre banhos de ouro, FAQs técnicas. Autoridade: backlinks de portais de moda, eventos, menções orgânicas. Confiabilidade: políticas de troca, HTTPS, certificados, resposta a 100% das avaliações. Digital PR e Link Building local."
      - titulo: "Otimização de Busca Visual, Multimodalidade e Google Lens"
        descricao: "SEO visual: WebP, compressão <100kb, lazy loading, nomenclatura descritiva. Alt Text semântico em linguagem natural. Product Schema: name, description, brand, offers, aggregateRating. Google Merchant Center + Google Lens (1 bi buscas visuais/mês). Direção de arte para conversão: fotos contextuais, iluminação, proporção, estilo de vida. Aumento de 25-40% no tráfego de busca visual com dados estruturados."
      - titulo: "Hegemonia Geográfica e SEO Local (Estudo de Caso: Goiânia)"
        descricao: "Perfil da Empresa no Google (GBP): categorias corretas, catálogo integrado, atualizações semanais. 3 pilares do algoritmo local: Relevância, Proximidade, Destaque. Consistência NAP obsessiva em todos os canais. Local Link Building: portais regionais, parcerias, feiras (FENINJER). Estudo de caso: Setor Campinas/Goiânia como polo joalheiro. Captação de reviews qualificados."
      - titulo: "Social Commerce, Catálogos e o Ecossistema do WhatsApp Business"
        descricao: "SEO interno no WhatsApp: títulos e descrições ricas em palavras-chave no catálogo. Scripts de conversão: de 'quanto custa?' para consultoria de moda (cross-selling, up-selling). Status do WhatsApp: 5-10 postagens/dia com gatilhos de escassez. Listas de transmissão segmentadas. WhatsApp Pay para reduzir fricção. Integração Instagram Shopping + WhatsApp. Automação de FAQs."
      - titulo: "Stack Tecnológico, Automação com IA e KPIs da Era Generativa"
        descricao: "IA como assistente treinada nos dados da marca (preservar E-E-A-T). Prompts especializados para nicho joalheiro: descrições, campanhas, suporte. Ferramentas: Clearscope, AIOSEO, Profound. Novos KPIs: Frequência de Citação, Share of Voice Generativo, Tráfego de Referência de IAs, Índice de Sentimento. Painel de métricas: do 'Posição 1 no Google' para visibilidade em LLMs. Plano de execução contínua."

