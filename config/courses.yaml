      - titulo: "O que é semijoia: matéria-prima, liga base e diferenciais vs bijuteria"
        descricao: "Latão, bronze e estanho. Por que a base importa. Diferença entre semijoia de qualidade e bijuteria fantasia. Herreira e os padrões de liga usados desde 2008."
      - titulo: "Banho de ouro 18K: processo, espessura e durabilidade"
        descricao: "Eletrodeposição, micras de espessura, por que o 18K é referência. Fatores que fazem o banho durar mais: primer de cobre, camada de níquel, acabamento. Garantia Herreira."
      - titulo: "Ródio branco e ródio negro: aplicações e estética"
