    prioridade: P0

  - slug: mcp-avancado
    nome: "MCP Avançado: Servidores, Protocolos e Integrações"
    nivel: avançado
    modulos: 12
    descricao: "Model Context Protocol em profundidade: criar servidores MCP, recursos, tools, sampling, integrações com browsers e IDEs."
    tags: [mcp, protocolo, servidores, integração]
    prerequisitos: [mcp-com-chrome, node-js]
    duracao_estimada: "~245 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "Fundamentos do MCP: arquitetura e conceitos-chave"
        descricao: "Protocolo cliente-servidor, JSON-RPC, capabilities negotiation, ciclo de vida de conexões."
      - titulo: "Primeiro Servidor MCP: setup com TypeScript SDK"
        descricao: "Inicializar projeto, implementar server básico, registrar capabilities, testar com Claude Desktop."
      - titulo: "Resources: expor dados estruturados ao LLM"
        descricao: "Definir recursos estáticos e dinâmicos, URIs, MIME types, templates de recurso."
      - titulo: "Tools: criar ferramentas executáveis pelo modelo"
        descricao: "Definir tools com JSON Schema, input validation, error handling, ferramentas assíncronas."
      - titulo: "Prompts: templates reutilizáveis e dinâmicos"
        descricao: "Prompt templates com argumentos, system prompts, embedded resources em prompts."
      - titulo: "Sampling: solicitar completions do cliente"
        descricao: "Server-initiated sampling, control de modelo e temperatura, human-in-the-loop."
      - titulo: "Transporte: stdio, SSE, HTTP e WebSocket"
        descricao: "Comparação de transportes, streaming, reconexão, proxy e tunneling."
      - titulo: "Autenticação e segurança: OAuth, tokens, sandboxing"
        descricao: "OAuth 2.0 para MCP, rate limiting, permissões granulares, sandboxing de ferramentas."
      - titulo: "Integração com IDEs: VS Code, JetBrains, Cursor"
        descricao: "Configuração em claude_desktop_config.json, extensões VS Code, debug de conexões MCP."
      - titulo: "Integração com browsers: Chrome, automação web"
        descricao: "MCP Chrome server, navegação automatizada, extração de dados, formulários."
      - titulo: "Multi-Server Orchestration: compor servidores MCP"
        descricao: "Múltiplos servers simultâneos, roteamento de requests, agregação de capabilities."
      - titulo: "Deploy em produção: Docker, monitoramento, scaling"
        descricao: "Containerizar MCP servers, health checks, métricas, horizontal scaling, CI/CD."

  - slug: prompt-engineering-avancado
    nome: "Prompt Engineering Avançado: Técnicas Profissionais"
    nivel: avançado
    modulos: 12
    descricao: "Chain-of-thought, few-shot, constitutional AI, prompt chaining, avaliação sistemática e otimização de custos."
    tags: [prompt-engineering, chain-of-thought, few-shot, avaliação]
    prerequisitos: [claude-code-cli]
    duracao_estimada: "~240 min"
    prioridade: P1
    estrutura_modulos:
      - titulo: "Fundamentos de Prompt Engineering"
        descricao: "O que é prompt engineering, por que importa, e como LLMs processam instruções."
      - titulo: "Anatomia de um Prompt Eficaz"
        descricao: "Componentes: instrução, contexto, exemplos, restrições, formato de saída."
      - titulo: "Zero-Shot e Few-Shot Learning"
        descricao: "Quando usar cada técnica, seleção de exemplos, impacto na qualidade."
      - titulo: "Chain-of-Thought (CoT)"
        descricao: "Raciocínio passo a passo, CoT zero-shot, auto-consistency, tree-of-thought."
      - titulo: "Role Prompting e System Prompts"
        descricao: "Definição de persona, system vs user prompts, guardrails comportamentais."
      - titulo: "Structured Output (JSON, XML)"
        descricao: "Forçar formato de saída, JSON mode, schemas de validação, parsing robusto."
      - titulo: "Prompt Chaining e Decomposição"
        descricao: "Dividir tarefas complexas, pipelines de prompts, passagem de contexto entre etapas."
      - titulo: "Retrieval-Augmented Generation (RAG)"
        descricao: "Embeddings, vector stores, chunking strategies, prompts com contexto externo."
      - titulo: "Prompt Templates e Variáveis"
        descricao: "Templates reutilizáveis, variáveis dinâmicas, versionamento de prompts."
      - titulo: "Avaliação e Métricas de Qualidade"
        descricao: "Benchmarks, human eval, LLM-as-judge, métricas automáticas, A/B testing."
      - titulo: "Otimização de Custo e Latência"
        descricao: "Redução de tokens, cache, batch processing, roteamento por complexidade."
      - titulo: "Prompt Engineering para Produção"
        descricao: "CI/CD de prompts, monitoramento, fallbacks, versionamento, observability."

