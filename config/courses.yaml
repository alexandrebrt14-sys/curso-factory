  - slug: introducao-as-semijoias
    nome: "Introdução às Semijoias: Materiais, Banhos e Pedras"
    nivel: iniciante
    modulos: 6
    descricao: "Base técnica para quem está começando na revenda: como são feitas as semijoias, diferença entre banho de ouro 18K e ródio, tipos de pedras (naturais vs zircônias), padrões de qualidade e como falar sobre produto com segurança."
    tags: [semijoias, banho-ouro-18k, produto, iniciante, herreira]
