      - titulo: "IA Generativa com Sigilo, LGPD e Revisão Humana"
        descricao: "IA na produção de conteúdo jurídico. Revisão humana obrigatória. Controlador vs. operador. Prompt hygiene, anonimização. Política interna de IA."
      - titulo: "Conversão Ética: Site, Formulário, WhatsApp, Chatbot e Intake"
        descricao: "CTAs sóbrios e institucionais. Formulários com minimização de dados. WhatsApp como triagem. Chatbot para primeiras informações. Fluxo LGPD."
      - titulo: "Autoridade Externa, Digital PR Jurídico e Reputação Institucional"
        descricao: "Artigos, entrevistas, docência, mídia. Backlinks institucionais. PR jurídico sem expor casos. Vedação a rankings pagos (Provimento 205)."
      - titulo: "Medição, Monitoramento e Plano de 90 Dias"
        descricao: "KPIs de visibilidade orgânica, local e GEO. Search Console, Business Profile, analytics. Scorecard por área e cidade. Roadmap 30/60/90."

  - slug: llm-finops
    nome: "LLM FinOps: Custos, Otimização e Governança de IA"
    nivel: avançado
    modulos: 10
    descricao: "Gestão de custos com LLMs, cache semântico, roteamento inteligente, budget guards, dashboards e relatórios para C-Level."
    tags: [finops, llm, custos, governança, otimização]
    prerequisitos: [python, prompt-engineering-avancado]
    duracao_estimada: "~211 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "Introdução ao LLM FinOps: por que custos de IA importam"
        descricao: "Panorama de gastos com LLMs em 2026, anatomia de uma fatura OpenAI/Anthropic/Google, framework FinOps aplicado a IA."
      - titulo: "Anatomia dos custos: tokens, modelos e pricing tiers"
        descricao: "Input vs output tokens, pricing por modelo, batch API, cached prompts, comparativo de custos entre providers."
      - titulo: "Monitoramento em tempo real: dashboards e alertas"
        descricao: "Logging estruturado de custos, dashboards com Grafana/Streamlit, alertas por threshold, cost attribution por feature."
      - titulo: "Cache semântico: reduzir chamadas repetidas com embeddings"
        descricao: "Exact match vs semantic cache, embeddings para similaridade, TTL, invalidação, Redis/pgvector."
      - titulo: "Roteamento inteligente: modelo certo para cada tarefa"
        descricao: "Classificador de complexidade, cascade (Haiku → Sonnet → Opus), fallback chains, A/B testing de modelos."
      - titulo: "Budget guards: limites, quotas e circuit breakers"
        descricao: "Rate limiting por usuário/feature, budget caps diários/mensais, circuit breaker pattern, graceful degradation."
      - titulo: "Otimização de prompts: menos tokens, mesma qualidade"
        descricao: "Prompt compression, few-shot selection, template reuse, structured output vs free-form, medição de qualidade."
      - titulo: "Batch processing e async: reduzir custos com filas"
        descricao: "Batch API (50% desconto), filas de processamento, priorização, dead letter queues, idempotência."
      - titulo: "Relatórios para C-Level: ROI, TCO e business cases"
        descricao: "Calcular ROI de IA, TCO completo (infra + API + ops), apresentar para diretoria, benchmarks de mercado."
      - titulo: "Governança e compliance: políticas, audit trails e LGPD"
        descricao: "Políticas de uso de IA, audit trails, data residency, LGPD, classificação de dados, revisão humana."

  - slug: seo-geo-para-dentistas
    nome: "SEO e GEO para Dentistas: Captar Pacientes no Google e em Respostas Generativas"
    nivel: intermediário
    modulos: 8
    descricao: "Visibilidade orgânica e generativa para consultórios e clínicas odontológicas respeitando o Código de Ética Odontológica do CFO, a Resolução CFO-196 e a LGPD. SEO local, conteúdo científico citável, GEO para ChatGPT/Perplexity/Gemini, Google Business Profile e conversão por WhatsApp com consentimento."
    tags: [seo, geo, odontologia, marketing-saude, cfo, lgpd]
    prerequisitos: []
    duracao_estimada: "~180 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "Fundamentos regulatórios: CFO-196, Código de Ética e LGPD para odontologia"
        descricao: "O que pode e o que não pode na comunicação odontológica. Vedações: sensacionalismo, antes-e-depois, preços, garantia de resultado. Limites da mídia paga. LGPD aplicada a dados de saúde (art. 11)."
      - titulo: "SEO local para consultórios: Google Business Profile e citações NAP"
        descricao: "Otimização do perfil GBP odontológico, categorização correta (Dental clinic/Dentist), reviews com conformidade CFO, citations em diretórios de saúde, schema LocalBusiness e Dentist."
      - titulo: "Conteúdo científico citável: do paper à página answer-first"
        descricao: "Tradução de evidência clínica em conteúdo educacional. Referências a Cochrane, SciELO, RBO. Estrutura answer-first para perguntas frequentes. Bloco citável para ChatGPT e Perplexity."
      - titulo: "GEO para odontologia: presença em ChatGPT, Perplexity e Gemini"
        descricao: "Como mecanismos generativos citam fontes odontológicas. Estrutura de autoridade: autor identificado, CRO visível, credenciais. Páginas FAQ estruturadas. Medição de share-of-voice generativo."
      - titulo: "Jornada do paciente digital: do sintoma ao agendamento"
        descricao: "Mapa de dor/busca por procedimento (ortodontia, implantes, clareamento, endodontia). Keywords informacionais vs transacionais. Conversão sem promessa de resultado. CTA conforme CFO."
      - titulo: "WhatsApp Business e intake digital dentro da LGPD"
        descricao: "Primeira conversa via WhatsApp. Script de triagem. Consentimento explícito para dados de saúde. Opt-in registrado. Encaminhamento presencial obrigatório para avaliação clínica."
      - titulo: "Reputação institucional e prova social compliant"
        descricao: "Reviews no Google sem incentivo financeiro. Depoimentos com consentimento documentado. Cases anonimizados. Publicações em mídia especializada. Parcerias com universidades e SBOs."
      - titulo: "KPIs, monitoramento e plano 90 dias"
        descricao: "Métricas de SEO local (impressões GBP, ações no perfil), orgânico (Search Console), GEO (menções em LLMs, referrals de IA). Roadmap 30/60/90 dias com metas realistas por porte de clínica."

  - slug: escrita-academica-profunda-geo
    nome: "Escrita Acadêmica Profunda para Publicação em GEO e LLM Research"
    nivel: avançado
    modulos: 6
    descricao: "Como estruturar, escrever e publicar papers rigorosos sobre Generative Engine Optimization (GEO), retrieval e IA generativa em SSRN, ArXiv (cs.IR), Zenodo, Semantic Scholar e journals Q1 como Information Sciences, JASIST e IP&M. Paradigmas de pesquisa (empirical, Design Science Research de Hevner, Action Design Research de Sein, systematic review), reproducibility em pesquisa com LLM, estatística para N pequeno, workflow de submissão, peer-review, altmetrics e caso prático do paper SSRN 6460680 do Alexandre Caramaschi."
    tags: [escrita-academica, paper, ssrn, arxiv, zenodo, semantic-scholar, q1-journals, geo, llm-research, peer-review, design-science-research]
    prerequisitos: [geo-fundamentos, metodologia-cientifica-basica]
    duracao_estimada: "~240 min"
    prioridade: P0
    estrutura_modulos:
      - titulo: "Fundamentos de escrita acadêmica: IMRAD, paradigmas de pesquisa e ciclo de vida do paper"
        descricao: "Estrutura IMRAD clássica (Introduction, Methods, Results, Discussion) e variações aceitas em CS/IR. Paradigmas disponíveis: empirical, Design Science Research (Hevner 2004; Wieringa 2014), Action Design Research (Sein 2011), qualitative, systematic review (Kitchenham 2007). Ciclo ideação → literatura → design → experimento → redação → submissão → review → revisão → publicação. Identificadores persistentes: ORCID, DOI, Handle, arXiv-id."
      - titulo: "Canais de publicação: SSRN, ArXiv (cs.IR), Zenodo, Semantic Scholar e journals Q1"
        descricao: "SSRN (pre-print com DOI rápido, open review, indexação Elsevier). ArXiv moderado (Cornell), track cs.IR para pesquisa em GEO/retrieval/LLM. Zenodo (CERN, DOI paralelo, datasets e software). Semantic Scholar (claim authorship via Crossref). Journals Q1 em information sciences: Information Sciences (Elsevier), JASIST (Wiley), Information Processing & Management, SIGIR proceedings. Workshops de entrada: SIGIR workshops, ECIR, CHIIR, CIKM. Comparativo de APC, tempo médio de review, rigor e scope adequado para GEO."
      - titulo: "Metodologia e rigor em pesquisa com LLM"
        descricao: "Reproducibility checklist: seeds, temperature, prompt templates, model cutoffs, versionamento. Estatística para N pequeno: effect size (Cohen d, Hedges g), intervalos de confiança, Bayes factor. Multiple-testing corrections: Holm-Bonferroni, FDR de Benjamini-Hochberg. Pre-registration: OSF Registries, AEA Registry, AsPredicted. Gestão de viés em avaliação com LLM-as-a-judge. Ablation studies obrigatórios em papers de retrieval."
      - titulo: "Writing craft: abstract estruturado, related work tematizado e contribution statement"
        descricao: "Abstract estruturado no padrão Emerald/Q1 (purpose, design/methodology/approach, findings, originality/value). Hedging language apropriado (may, suggest, appears to) vs linguagem determinística. Related Work organizado tematicamente por construto, não cronologicamente. Contribution statement explícito ao final da introdução (3-5 bullets). Discussion que responde as research questions declaradas, não apenas resume findings. Limitations section honesta e threats to validity (internal, external, construct, conclusion)."
      - titulo: "Publicando e divulgando: metadata, cross-posting e altmetrics"
        descricao: "Metadata por canal: JEL codes (SSRN), ACM CCS 2012 (ArXiv CS), MSC codes (math), keywords controlados, subject classification. Cross-posting strategy sem violar exclusivity policies (SSRN permite; journals Q1 variam — ler copyright transfer). Divulgação pós-publicação: LinkedIn com citação DOI completa, Substack com thread tecnica, Medium, ResearchGate. Altmetrics: Plum Print no SSRN, Altmetric.com, Impactstory. Medição honesta de impacto: citations via Google Scholar, Crossref, OpenAlex."
      - titulo: "Caso prático: paper SSRN 6460680 e roadmap dos próximos 3 papers do Alexandre Caramaschi"
        descricao: "Decomposição do paper publicado Algorithmic Authority: A Practitioner Framework for GEO (DOI 10.2139/ssrn.6460680): como o framework 10-layer → Algorithmic Citability → ECS foi construído. Lições aprendidas na primeira submissão: review time, feedback editorial, revisões. Roadmap dos 3 working papers em preparação no repo alexandrebrt14-sys/papers com targets ArXiv cs.IR, workshop SIGIR/WWW e Information Sciences Q1. Ética acadêmica: Wikipedia WP:BIO (notability) vs Wikidata (permissivo), conflito de interesse em practitioner research, disclosure de vínculos comerciais."

